
# ───────────────────────────────────────────────────────────────────────────────
# LuminaLib – Full-Stack Docker Compose
# Services: postgres | redis | backend (FastAPI) | frontend (Next.js)
# ───────────────────────────────────────────────────────────────────────────────

networks:
  lumina-net:
    driver: bridge

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: luminalib-postgres
    restart: unless-stopped
    networks:
      - lumina-net
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: luminalib
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: luminalib-redis
    restart: unless-stopped
    networks:
      - lumina-net
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./Lumina-backend
      dockerfile: Dockerfile
    container_name: luminalib-backend
    restart: unless-stopped
    networks:
      - lumina-net
    ports:
      - "8000:8000"
    environment:
      # Database (must be in env — needed before DB is reachable)
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/luminalib
      # JWT secrets (stay in env, never in a DB row)
      JWT_SECRET: change-me-in-production
      JWT_ALGORITHM: HS256
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./Lumina-backend/storage:/app/storage

  # ── Next.js Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./Lumina-frontend
      dockerfile: Dockerfile
    container_name: luminalib-frontend
    restart: unless-stopped
    networks:
      - lumina-net
    ports:
      - "3000:3000"
    environment:
      # Points to the host machine so browser requests reach the backend
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NODE_ENV: production
    depends_on:
      - backend

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  pgdata:
    name: luminalib-pgdata
